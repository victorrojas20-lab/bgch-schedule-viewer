<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGCH Staff Schedule Viewer</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #f9fafc;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #0057b8; /* BGCH blue */
      color: white;
      text-align: center;
      padding: 25px 0;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 1px;
    }

    main {
      padding: 20px;
      max-width: 900px;
      margin: auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .search-container {
      text-align: center;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 60%;
      padding: 10px;
      border: 2px solid #0057b8;
      border-radius: 5px;
      font-size: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
    }

    th {
      background-color: #0057b8;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tr:hover {
      background-color: #ffe680; /* BGCH gold highlight */
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: #0057b8;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>

  <header>
    <h1>Boys & Girls Club of Greater Holyoke</h1>
    <p>Staff Schedule Viewer</p>
  </header>

      <input type="text" id="searchInput" placeholder="Search by staff name...">
    </div>
